<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Chariot wheel (outer ring) -->
  <circle cx="32" cy="35" r="22" fill="none" stroke="#2C1A0E" stroke-width="3"/>
  <!-- Gear teeth around wheel -->
  <g fill="#2C1A0E">
    <rect x="30" y="11" width="4" height="5" rx="1"/>
    <rect x="30" y="55" width="4" height="5" rx="1"/>
    <rect x="8" y="33" width="5" height="4" rx="1"/>
    <rect x="51" y="33" width="5" height="4" rx="1"/>
    <rect x="13.5" y="17.5" width="4" height="4" rx="1" transform="rotate(45 15.5 19.5)"/>
    <rect x="46.5" y="17.5" width="4" height="4" rx="1" transform="rotate(45 48.5 19.5)"/>
    <rect x="13.5" y="49" width="4" height="4" rx="1" transform="rotate(45 15.5 51)"/>
    <rect x="46.5" y="49" width="4" height="4" rx="1" transform="rotate(45 48.5 51)"/>
  </g>
  <!-- Spokes -->
  <g stroke="#2C1A0E" stroke-width="1.2">
    <line x1="32" y1="35" x2="32" y2="15"/>
    <line x1="32" y1="35" x2="32" y2="55"/>
    <line x1="32" y1="35" x2="12" y2="35"/>
    <line x1="32" y1="35" x2="52" y2="35"/>
    <line x1="32" y1="35" x2="16.5" y2="19.5"/>
    <line x1="32" y1="35" x2="47.5" y2="19.5"/>
    <line x1="32" y1="35" x2="16.5" y2="50.5"/>
    <line x1="32" y1="35" x2="47.5" y2="50.5"/>
  </g>
  <!-- Center sun -->
  <circle cx="32" cy="35" r="5" fill="#E8651A"/>
  <!-- House roof -->
  <polygon points="32,25 23,33 41,33" fill="#2C1A0E" opacity="0.85"/>
  <!-- House body -->
  <rect x="25" y="33" width="14" height="10" fill="#2C1A0E" opacity="0.85"/>
  <!-- House windows -->
  <rect x="27" y="35" width="3" height="3" fill="#FDF8F0" rx="0.3"/>
  <rect x="34" y="35" width="3" height="3" fill="#FDF8F0" rx="0.3"/>
  <!-- House door -->
  <rect x="30" y="38" width="4" height="5" fill="#FDF8F0" rx="0.5"/>
  <!-- Building left -->
  <rect x="19" y="27" width="6" height="16" fill="#2C1A0E" opacity="0.85"/>
  <rect x="20" y="28.5" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="22.5" y="28.5" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="20" y="32" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="22.5" y="32" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="20" y="35.5" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="22.5" y="35.5" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="20" y="39" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <rect x="22.5" y="39" width="1.8" height="2" fill="#FDF8F0" rx="0.3"/>
  <!-- Peacock feather stem -->
  <line x1="32" y1="14" x2="32" y2="3" stroke="#8B5E3C" stroke-width="1.5"/>
  <!-- Peacock feather -->
  <ellipse cx="32" cy="4" rx="5" ry="7" fill="#1A7A6A"/>
  <ellipse cx="32" cy="4.5" rx="3.5" ry="5" fill="#E8A030"/>
  <ellipse cx="32" cy="5" rx="2" ry="3.2" fill="#1A5C4E"/>
  <circle cx="32" cy="5.5" r="1.2" fill="#0E0A06"/>
</svg>
